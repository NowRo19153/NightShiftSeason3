<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fischer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#020617">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css" />
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(err => console.log(err));
      });
    }
  </script>
</head>
<body class="theme-dark">
  <div id="app">
    <header class="top-bar">
      <div class="app-title" id="appTitle">Fischer</div>
      <nav class="nav-tabs">
        <button class="nav-tab active" data-view="dashboard" onclick="switchView('dashboard', this)">Dashboard</button>
        <button class="nav-tab" data-view="work" onclick="switchView('work', this)">Work</button>
        <button class="nav-tab" data-view="people" onclick="switchView('people', this)">People</button>
        <button class="nav-tab" data-view="settings" onclick="switchView('settings', this)">Settings</button>
      </nav>
    </header>

    <main id="mainView"></main>
  </div>

  <div id="modalBackdrop" class="modal-backdrop hidden" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2 id="modalTitle"></h2>
        <button class="icon-btn" onclick="hideModal()">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
